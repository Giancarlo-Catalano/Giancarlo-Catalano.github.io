<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Clock</title>
    <style>
        :root {
            /* Dark Mode (Default) */
            --bg-color: #121212;
            --text-color: #ffffff;
            --panel-bg: #1e1e1e;
            --dark-green: #006938;
            --dark-purple: #7c184f;
            --highlight-time: #76b72a;
            --shadow: 0 8px 16px rgba(0,0,0,0.6);
            --border-radius: 20px;
            --danger: #ff4d4d;
            --secondary-text: #aaaaaa;
            --input-bg: #2a2a2a;
            --resizer-color: #333333;
            --timer-count: 2;
        }

        [data-theme="light"] {
            /* Light Mode */
            --bg-color: #e4e4e4;
            --text-color: #121212;
            --panel-bg: #ffffff;
            --highlight-time: #7c184f;
            --shadow: 0 8px 16px rgba(0,0,0,0.1);
            --secondary-text: #555555;
            --input-bg: #f0f0f0;
            --resizer-color: #cccccc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Top Section */
        .top-pane {
            height: 33.33vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 2px solid var(--dark-purple);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: var(--shadow);
            transition: 0.2s;
        }

        .theme-toggle:hover {
            background-color: var(--dark-purple);
            color: #fff;
        }

        .clock-container {
            background-color: var(--panel-bg);
            width: 70%;
            height: 100%;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            font-weight: bold;
            letter-spacing: 5px;
            border-bottom: 8px solid var(--dark-green);
        }

        /* Bottom Section */
        .bottom-pane {
            height: 66.66vh;
            display: flex;
            padding: 0 20px 20px 20px;
            gap: 15px;
        }

        .left-pane {
            flex: 1;
            background-color: var(--panel-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Fallback scrollbar enabled */
            min-width: 350px;
        }

        .resizer {
            width: 8px;
            background-color: var(--resizer-color);
            border-radius: 4px;
            cursor: col-resize;
            transition: background-color 0.2s;
        }

        .resizer:hover, .resizer:active {
            background-color: var(--dark-green);
        }

        .right-pane {
            flex: 1;
            background-color: var(--panel-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-width: 300px;
        }

        /* Timers Layout */
        .timers-list {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .timer-block {
            background-color: var(--input-bg);
            padding: 10px 15px;
            border-radius: 15px;
            border-left: 8px solid;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            flex: 1 1 auto;
            min-height: 80px; /* The safety net: triggers scrollbar if screen gets too full */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .timer-content {
            display: flex;
            flex-direction: row; /* Aligns items horizontally */
            flex-wrap: wrap; /* Wraps to next line if panel is too narrow */
            align-items: center;
            flex-grow: 1;
            gap: 15px;
            min-width: 0;
        }

        /* Unified Shared Font Styling */
        .dynamic-font {
            /* Smooth scaling with a hard minimum size */
            font-size: clamp(1.2rem, calc(40vh / (var(--timer-count) * 1.5)), 2rem);
            font-weight: bold;
            color: var(--text-color);
            line-height: 1.2;
        }

        input.dynamic-font {
            background: transparent;
            border: 1px dashed transparent;
            padding: 2px 5px;
            border-radius: 5px;
            outline: none;
        }

        input[type="text"].dynamic-font {
            width: clamp(120px, 30%, 250px);
            flex-grow: 1; /* Name input stretches */
        }

        input[type="time"].dynamic-font {
            width: auto;
        }

        input.dynamic-font:focus,
        input.dynamic-font:hover {
            border-color: var(--secondary-text);
            background: var(--bg-color);
        }

        .remaining-time-display {
            color: var(--highlight-time);
            white-space: nowrap;
        }

        .remaining-time-display.negative {
            color: var(--danger);
        }

        /* 2x2 Grid Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            opacity: 0.3;
            transition: opacity 0.2s;
            align-items: center;
            justify-items: center;
            padding-left: 15px;
            flex-shrink: 0;
        }

        .timer-block:hover .controls {
            opacity: 1;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-size: 1.4rem; /* Static size to maintain 2x2 grid structure */
            transition: transform 0.1s;
            position: relative;
        }

        .icon-btn:active { transform: scale(0.9); }
        .icon-btn:hover { color: var(--danger); }
        .icon-btn.move:hover, .icon-btn.clock:hover { color: var(--dark-green); }

        /* Custom Tooltip CSS */
        [data-tooltip]::before {
            content: attr(data-tooltip);
            position: absolute;
            right: 130%;
            top: 50%;
            transform: translateY(-50%);
            background-color: var(--text-color);
            color: var(--bg-color);
            font-size: 0.9rem;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        [data-tooltip]:hover::before {
            opacity: 1;
        }

        .add-btn {
            background-color: var(--dark-green);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
            box-shadow: var(--shadow);
            transition: background-color 0.2s;
        }

        .add-btn:hover { background-color: #008a4a; }

        /* Notes */
        .notes-area {
            flex-grow: 1;
            background-color: transparent;
            border: none;
            color: var(--text-color);
            font-size: 1.8rem;
            line-height: 1.6;
            outline: none;
            resize: none;
            overflow-y: auto;
        }

        .notes-area:focus {
            outline: none;
        }
    </style>
</head>
<body>

    <div class="top-pane">
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">Switch to Light Mode</button>
        <div class="clock-container" id="mainClock">
            00:00
        </div>
    </div>

    <div class="bottom-pane">

        <div class="left-pane" id="leftPane">
            <div class="timers-list" id="timersList">
                </div>
            <button class="add-btn" onclick="addTimer()">+ Add Timer</button>
        </div>

        <div class="resizer" id="resizer"></div>

        <div class="right-pane" id="rightPane">
            <div class="notes-area" id="notesArea" contenteditable="true">
                Module code: JV....<br>
                Module name: ...<br>
                Today's date: June 2, 2026
            </div>
        </div>
    </div>

    <script>
        // --- 1. Data Protection & Initialization ---

        window.addEventListener('beforeunload', (e) => {
            e.preventDefault();
            e.returnValue = '';
        });

        const now = new Date();
        const nextHour = new Date(now);
        nextHour.setHours(now.getHours() + 1, 0, 0, 0);

        const twoHoursLater = new Date(nextHour);
        twoHoursLater.setHours(nextHour.getHours() + 2);

        function formatTo24H(dateObj) {
            return dateObj.getHours().toString().padStart(2, '0') + ':' +
                   dateObj.getMinutes().toString().padStart(2, '0');
        }

        let timers = [
            { id: generateId(), name: 'Exam start', time: formatTo24H(nextHour), showRemaining: false, color: getRandomColor() },
            { id: generateId(), name: 'Exam end', time: formatTo24H(twoHoursLater), showRemaining: true, color: getRandomColor() }
        ];

        // --- 2. Theme Management ---
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                btn.innerText = 'Switch to Light Mode';
            } else {
                body.setAttribute('data-theme', 'light');
                btn.innerText = 'Switch to Dark Mode';
            }
        }

        // --- 3. Pane Resizer Logic ---
        const resizer = document.getElementById('resizer');
        const leftPane = document.getElementById('leftPane');
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerWidth = document.body.clientWidth;
            const newLeftWidth = (e.clientX / containerWidth) * 100;
            if (newLeftWidth > 15 && newLeftWidth < 85) {
                leftPane.style.flex = `0 0 ${newLeftWidth}%`;
            }
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
        });

        // --- 4. Timer Rendering & Management ---
        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function getRandomColor() {
            const colors = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function renderTimers() {
            const container = document.getElementById('timersList');
            container.innerHTML = '';

            // Push the timer count to CSS for font scaling
            document.documentElement.style.setProperty('--timer-count', timers.length || 1);

            timers.forEach((timer, index) => {
                const block = document.createElement('div');
                block.className = 'timer-block';
                block.style.borderColor = timer.color;

                block.innerHTML = `
                    <div class="timer-content">
                        <input type="text" class="dynamic-font" value="${timer.name}" onchange="updateTimer('${timer.id}', 'name', this.value)">
                        <input type="time" class="dynamic-font" value="${timer.time}" onchange="updateTimer('${timer.id}', 'time', this.value)">
                        <div class="remaining-time-display dynamic-font" id="remaining-${timer.id}" style="display: ${timer.showRemaining ? 'block' : 'none'};">
                            --:--
                        </div>
                    </div>
                    <div class="controls">
                        <button class="icon-btn clock" data-tooltip="Toggle Countdown" onclick="updateTimer('${timer.id}', 'showRemaining', ${!timer.showRemaining})">⏱️</button>
                        <button class="icon-btn" data-tooltip="Delete Timer" onclick="deleteTimer('${timer.id}')">🗑️</button>
                        <button class="icon-btn move" data-tooltip="Move Up" onclick="moveTimer(${index}, -1)">▲</button>
                        <button class="icon-btn move" data-tooltip="Move Down" onclick="moveTimer(${index}, 1)">▼</button>
                    </div>
                `;
                container.appendChild(block);
            });

            updateMainClock();
        }

        function addTimer() {
            timers.push({
                id: generateId(),
                name: 'New Timer',
                time: '12:00',
                showRemaining: false,
                color: getRandomColor()
            });
            renderTimers();

            // Scroll to bottom when adding a new timer, in case scrollbar is active
            const leftPane = document.getElementById('leftPane');
            setTimeout(() => {
                leftPane.scrollTo({ top: leftPane.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        function updateTimer(id, field, value) {
            const timer = timers.find(t => t.id === id);
            if (timer) {
                timer[field] = value;
                if (field === 'showRemaining') {
                    renderTimers();
                }
            }
        }

        function deleteTimer(id) {
            timers = timers.filter(t => t.id !== id);
            renderTimers();
        }

        function moveTimer(index, direction) {
            if (index + direction < 0 || index + direction >= timers.length) return;
            const temp = timers[index];
            timers[index] = timers[index + direction];
            timers[index + direction] = temp;
            renderTimers();
        }

        // --- 5. Clock & Countdown Logic ---
        function parseTime(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const d = new Date();
            d.setHours(hours, minutes, 0, 0);
            return d;
        }

        function formatDiff(ms) {
            const isNegative = ms < 0;
            const absMs = Math.abs(ms);

            const totalSeconds = Math.floor(absMs / 1000);
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;

            let result = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (isNegative) result = "-" + result;
            return { text: result, isNegative };
        }

        function updateMainClock() {
            const currentTime = new Date();
            let showSeconds = false;

            const endTimer = timers.find(t => t.name.toLowerCase().trim() === 'exam end');
            if (endTimer && endTimer.time) {
                const targetTime = parseTime(endTimer.time);
                const diffMs = targetTime - currentTime;

                if (diffMs <= 120000) {
                    showSeconds = true;
                }
            }

            const h = currentTime.getHours().toString().padStart(2, '0');
            const m = currentTime.getMinutes().toString().padStart(2, '0');
            const s = currentTime.getSeconds().toString().padStart(2, '0');

            document.getElementById('mainClock').innerText = showSeconds ? `${h}:${m}:${s}` : `${h}:${m}`;

            timers.forEach(timer => {
                if (timer.showRemaining && timer.time) {
                    const el = document.getElementById(`remaining-${timer.id}`);
                    if (el) {
                        const target = parseTime(timer.time);
                        const diffObj = formatDiff(target - currentTime);
                        el.innerText = diffObj.text;

                        if (diffObj.isNegative) {
                            el.classList.add('negative');
                        } else {
                            el.classList.remove('negative');
                        }
                    }
                }
            });
        }

        // Initialize application
        renderTimers();
        setInterval(updateMainClock, 1000);

    </script>
</body>
</html>
