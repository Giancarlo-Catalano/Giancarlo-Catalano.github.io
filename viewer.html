<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Feed Viewer</title>
    <style>
        :root {
            --primary-dark-green: #006938;
            --primary-light-green: #76b72a;
            --secondary-dark-blue: #003A3D;
            --secondary-magenta: #511535;

            --bg-colour: #ffffff;
            --text-colour: #222222;
            --card-bg: #f9f9f9;
            --border-colour: #dddddd;
            --error-bg: #ffe6e6;
            --error-text: #cc0000;
        }

        [data-theme="dark"] {
            --bg-colour: #1a1a1a;
            --text-colour: #f0f0f0;
            --card-bg: #2d2d2d;
            --border-colour: #444444;
            --primary-dark-green: #76b72a;
            --primary-light-green: #006938;
            --secondary-dark-blue: #4db8ff;
            --error-bg: #5c0000;
            --error-text: #ff9999;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-colour);
            color: var(--text-colour);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
            font-size: 110%; /* Slightly larger for readability */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--primary-dark-green);
        }

        h1 {
            margin: 0;
            font-size: 1.5em;
            color: var(--secondary-dark-blue);
        }

        button {
            background-color: var(--primary-dark-green);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--primary-light-green);
        }

        .error-box {
            background-color: var(--error-bg);
            color: var(--error-text);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            border-left: 5px solid var(--error-text);
        }

        #feed-container {
            display: grid;
            gap: 20px;
            /* Columns are set via JavaScript based on settings */
            grid-template-columns: 1fr;
        }

        .feed-column {
            background-color: var(--card-bg);
            border: 1px solid var(--border-colour);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            max-height: 80vh;
        }

        .feed-title {
            color: var(--secondary-magenta);
            border-bottom: 2px solid var(--primary-light-green);
            padding-bottom: 5px;
            margin-top: 0;
        }

        .feed-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-colour);
        }

        .feed-item:last-child {
            border-bottom: none;
        }

        .feed-item a {
            color: var(--secondary-dark-blue);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
        }

        .feed-item a:hover {
            text-decoration: underline;
        }

        .feed-date {
            font-size: 0.8em;
            color: gray;
            margin-bottom: 5px;
            display: block;
        }

        .loading {
            text-align: center;
            font-size: 1.2em;
            color: var(--primary-dark-green);
        }
    </style>
</head>
<body>

    <header>
    <h1>📰 Latest Updates</h1>
    <button id="theme-toggle" aria-label="Toggle Night Mode">🌙 Night Mode</button>
</header>

<div id="error-message" class="error-box"></div>

<div id="loading-indicator" class="loading">⏳ Fetching the news and testing connections... please wait.</div>

<div id="feed-container"></div>
</body>
<script>
    // Setup Theme Toggle
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeToggle.textContent = isDark ? '🌙 Night Mode' : '☀️ Day Mode';
    });

    // Helper to show errors
    function showError(message, fixHint) {
        const errorBox = document.getElementById('error-message');
        errorBox.innerHTML = `<strong>⚠️ Oops, something went wrong!</strong><br>${message}<br><em>How to fix: ${fixHint}</em>`;
        errorBox.style.display = 'block';
        document.getElementById('loading-indicator').style.display = 'none';
    }

    // List of different services to try bypassing the browser security block
    const workarounds = [
        {
            name: 'CodeTabs',
            type: 'xml',
            getUrl: (uri) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(uri)}`
        },
        {
            name: 'CorsProxy.io',
            type: 'xml',
            getUrl: (uri) => `https://corsproxy.io/?${encodeURIComponent(uri)}`
        },
        {
            name: 'AllOrigins',
            type: 'json',
            getUrl: (uri) => `https://api.allorigins.win/get?url=${encodeURIComponent(uri)}`
        }
    ];

    // Function to try fetching a single feed using all available workarounds
    async function fetchFeedSafely(uri) {
        let lastErrorMessage = "";

        for (const proxy of workarounds) {
            try {
                const response = await fetch(proxy.getUrl(uri));

                if (!response.ok) {
                    throw new Error("Connection refused by this service.");
                }

                let xmlText = "";
                if (proxy.type === 'json') {
                    // AllOrigins wraps the result in a JSON package
                    const data = await response.json();
                    xmlText = data.contents;
                } else {
                    // The others give us the raw text directly
                    xmlText = await response.text();
                }

                // Convert the text into an XML document
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");

                // Check if it broke while converting
                if (xmlDoc.querySelector("parsererror")) {
                    throw new Error("The website gave us text, but it wasn't a valid feed.");
                }

                // If we reach here, it worked! Return the document and the name of the service.
                return { doc: xmlDoc, serviceUsed: proxy.name };

            } catch (error) {
                // It failed. Remember the error and let the loop try the next service.
                lastErrorMessage = error.message;
            }
        }

        // If the loop finishes and we are here, ALL services failed.
        throw new Error(`All workarounds failed. Last error: ${lastErrorMessage}`);
    }

    // Main function to read settings and build feeds
    async function loadFeeds() {
        const hash = window.location.hash.substring(1);

        if (!hash) {
            showError("There are no news feeds linked to this page.", "Please use the Builder page to create a proper link, then try opening it again.");
            return;
        }

        let settings;
        try {
            const decodedText = atob(hash);
            settings = JSON.parse(decodedText);
        } catch (e) {
            showError("The link looks broken or unreadable.", "Go back to the Builder page and generate a fresh link.");
            return;
        }

        const container = document.getElementById('feed-container');
        const columns = parseInt(settings.columns) || 1;
        container.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;

        const uris = settings.uris || [];
        const wordLimit = parseInt(settings.wordlimit) || 50;

        if (uris.length === 0) {
            showError("No websites were added to this link.", "Go back to the Builder and add at least one web address (URI).");
            return;
        }

        // Process each feed
        for (const uri of uris) {
            const columnDiv = document.createElement('div');
            columnDiv.className = 'feed-column';
            columnDiv.innerHTML = `<h2 class="feed-title">⏳ Testing connections...</h2>`;
            container.appendChild(columnDiv);

            try {
                // Try to fetch using our multi-service setup
                const result = await fetchFeedSafely(uri);
                const xmlDoc = result.doc;

                const channelTitle = xmlDoc.querySelector("channel > title")?.textContent || "News Feed";

                // Show title and which service worked
                let htmlContent = `
                    <h2 class="feed-title">📰 ${channelTitle}</h2>
                    <div class="proxy-badge">✅ Connected via ${result.serviceUsed}</div>
                `;

                const items = xmlDoc.querySelectorAll("item");
                if (items.length === 0) {
                    htmlContent += `<p>No news found here right now.</p>`;
                }

                items.forEach(item => {
                    const title = item.querySelector("title")?.textContent || "Untitled";
                    const link = item.querySelector("link")?.textContent || "#";
                    const pubDate = item.querySelector("pubDate")?.textContent || "";

                    let description = item.querySelector("description")?.textContent || "";

                    const tempDiv = document.createElement("div");
                    tempDiv.innerHTML = description;
                    let cleanText = tempDiv.textContent || tempDiv.innerText || "";

                    let words = cleanText.split(/\s+/);
                    if (words.length > wordLimit) {
                        cleanText = words.slice(0, wordLimit).join(" ") + "...";
                    }

                    let niceDate = pubDate;
                    if (pubDate) {
                        try { niceDate = new Date(pubDate).toLocaleDateString('en-GB'); } catch(e){}
                    }

                    htmlContent += `
                        <div class="feed-item">
                            <a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a>
                            <span class="feed-date">📅 ${niceDate}</span>
                            <p>${cleanText}</p>
                        </div>
                    `;
                });

                columnDiv.innerHTML = htmlContent;

            } catch (error) {
                columnDiv.innerHTML = `
                    <h2 class="feed-title">⚠️ Feed Error</h2>
                    <p style="color: var(--error-text);">We couldn't load this feed, even after trying multiple workarounds.</p>
                    <p style="font-size: 0.9em;">Link: ${uri}</p>
                    <p style="font-size: 0.8em; color: gray;">Technical detail: ${error.message}</p>
                `;
            }
        }

        document.getElementById('loading-indicator').style.display = 'none';
    }

    loadFeeds();
</script>

</html>
