<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marking Table Generator</title>
    <style>
        :root {
            --primary-bg: #fdfdfd;
            --border-color: #ced4da;
            --warning-bg: #fff3cd;
            --warning-border: #ffeeba;
            --warning-text: #856404;
            --accent-color: #007bff;
            --selected-bg: #e2f0fe;
            --selected-border: #b8daff;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: var(--primary-bg);
        }

        header {
            padding: 10px 20px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.2rem; margin: 0; color: #333; }

        /* Resizable Layout */
        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #left-panel {
            min-width: 300px;
            width: 60%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        #resizer {
            width: 8px;
            cursor: col-resize;
            background: #eee;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        #resizer:hover { background: #ddd; }

        #right-panel {
            flex: 1;
            min-width: 300px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8f9fa;
            overflow-y: auto;
        }

        /* Notifications */
        .notification {
            background-color: var(--warning-bg);
            border: 1px solid var(--warning-border);
            color: var(--warning-text);
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        /* Inputs */
        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 200px;
        }

        label {
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #555;
        }

        textarea {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            resize: none;
        }

        /* Table Styling */
        table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: center;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        th:first-child, td:first-child {
            text-align: left;
            width: 25%;
        }

        th:nth-child(2), td:nth-child(2) {
            width: 10%;
        }

        thead th {
            background-color: #f1f3f5;
            font-size: 0.85rem;
        }

        .crit-title { font-weight: bold; display: block; }
        .crit-desc { font-size: 0.8rem; color: #666; font-weight: normal; }

        /* Grade Selection Styling */
        .grade-cell {
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s;
            user-select: none;
        }

        .grade-cell:hover {
            background-color: #f1f3f5;
        }

        .grade-cell.selected {
            background-color: var(--selected-bg) !important;
            border: 2px solid var(--accent-color);
            font-weight: bold;
            color: #004085;
        }

        /* Score Tally Row */
        .total-row {
            background-color: #e9ecef;
            font-weight: bold;
        }

        .total-row td {
            text-align: left;
            font-size: 1.05rem;
            padding: 12px 8px;
        }

        /* Footer / Actions */
        .actions {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover { background-color: #0056b3; }

        #copy-msg {
            color: #28a745;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

<header>
    <h1>Simple Marking Criteria Generator</h1>
</header>

<div class="main-wrapper">
    <div id="left-panel">
        <div id="notifications"></div>
        <div id="table-output"></div>

        <div class="actions">
            <button id="copy-btn">Copy Table to Clipboard</button>
            <span id="copy-msg">Table copied to clipboard!</span>
        </div>
    </div>

    <div id="resizer"></div>

    <div id="right-panel">
        <div class="input-group">
            <label>Criteria (Syntax: Name (Weight%): Description)</label>
            <textarea id="crit-input">Functionality (30%): Does the program launch without errors? Does it correctly read the input file? Does it correctly save the file?
User Interface (20%): Is the GUI layout clear? Can a user understand how to use it immediately? Is the date/time input easy to use?
Data Structures (25%): Report: Did you justify why you chose your specific data structure? Did you discuss the pros and cons?
AI and critical thinking (25%): Report: Is the AI usage clearly documented? Did you critically check the AI code? Does the report explain the decisions you've taken</textarea>
        </div>

        <div class="input-group">
            <label>Grade Levels (Syntax: Level Name (Max Score))</label>
            <textarea id="level-input">Above and Beyond (75)
All done well (65)
Everything is there (55)
Just enough (45)
Fail (20)
None (0)</textarea>
        </div>
    </div>
</div>

<script>
    const leftPanel = document.getElementById('left-panel');
    const resizer = document.getElementById('resizer');
    const critInput = document.getElementById('crit-input');
    const levelInput = document.getElementById('level-input');
    const tableOutput = document.getElementById('table-output');
    const notifications = document.getElementById('notifications');

    // State object to remember score choices per row index
    let selectedScores = {};
    let maxPossibleScore = 0;

    // 1. Panel Resizing Logic
    let isResizing = false;

    resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        document.body.style.cursor = 'col-resize';
    });

    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const offsetLeft = e.clientX;
        const totalWidth = window.innerWidth;
        const percentage = (offsetLeft / totalWidth) * 100;

        if (percentage > 20 && percentage < 80) {
            leftPanel.style.width = `${percentage}%`;
        }
    });

    document.addEventListener('mouseup', () => {
        isResizing = false;
        document.body.style.cursor = 'default';
    });

    // 2. Generation & Calculation Logic
    function update() {
        const critText = critInput.value.split('\n').filter(l => l.trim() !== '');
        const levelText = levelInput.value.split('\n').filter(l => l.trim() !== '');

        let criteria = [];
        let levels = [];
        let errors = [];

        // Parse Criteria
        critText.forEach(line => {
            const match = line.match(/^(.+?)\s*\((\d+(?:\.\d+)?)\s*%\)\s*:\s*(.*)$/i);
            if (match) {
                criteria.push({
                    name: match[1].trim(),
                    weight: parseFloat(match[2]),
                    desc: match[3].trim()
                });
            } else {
                errors.push(`Criteria format error: "${line.substring(0, 20)}...". Required syntax: Name (Percentage%): Description`);
            }
        });

        // Parse Levels
        levelText.forEach(line => {
            const match = line.match(/^(.+?)\s*\((\d+(?:\.\d+)?)\)$/i);
            if (match) {
                levels.push({
                    name: match[1].trim(),
                    score: parseFloat(match[2])
                });
            } else {
                errors.push(`Grade Level missing score: "${line}". Required syntax: LevelName (Score)`);
            }
        });

        // Calculate max possible score dynamically (Highest level score)
        maxPossibleScore = levels.length > 0 ? Math.max(...levels.map(l => l.score)) : 0;

        // Validation
        const totalWeight = criteria.reduce((sum, c) => sum + c.weight, 0);
        if (criteria.length > 0 && Math.abs(totalWeight - 100) > 0.1) {
            errors.push(`Percentages do not add up to 100% (Currently: ${totalWeight}%)`);
        }

        // Render Notifications
        notifications.innerHTML = '';
        errors.forEach(err => {
            const div = document.createElement('div');
            div.className = 'notification';
            div.textContent = err;
            notifications.appendChild(div);
        });

        if (criteria.length === 0 || levels.length === 0) {
            tableOutput.innerHTML = '<p style="color:#999">Enter valid criteria and levels to generate table.</p>';
            return;
        }

        // Generate Table
        let tableHtml = '<table><thead><tr><th>Criteria</th><th>Weight</th>';
        levels.forEach(l => tableHtml += `<th>${l.name}</th>`);
        tableHtml += '</tr></thead><tbody>';

        criteria.forEach((c, rowIndex) => {
            tableHtml += `<tr data-row-index="${rowIndex}">
                <td><span class="crit-title">${c.name}</span><span class="crit-desc">${c.desc}</span></td>
                <td>${c.weight}%</td>`;

            levels.forEach(l => {
                const raw = (l.score * (c.weight / 100));
                const val = Math.round(raw * 10) / 10;

                // Keep selection persistent across structural text re-inputs if match is possible
                const isSelected = selectedScores[rowIndex] === val;
                const cellClass = isSelected ? 'grade-cell selected' : 'grade-cell';

                tableHtml += `<td class="${cellClass}" data-value="${val}">${val}</td>`;
            });
            tableHtml += '</tr>';
        });

        // Add Total Running Row at the bottom
        const columnSpan = levels.length + 2;
        tableHtml += `<tr class="total-row">
            <td colspan="${columnSpan}">Total Calculated Score: <span id="running-total">0</span> / ${maxPossibleScore}</td>
        </tr>`;

        tableHtml += '</tbody></table>';
        tableOutput.innerHTML = tableHtml;

        // Add interactive clicking capability to the fresh cells
        setupCellClicking();
        calculateTotal();
    }

    // Handle interactive selection
    function setupCellClicking() {
        const cells = tableOutput.querySelectorAll('.grade-cell');
        cells.forEach(cell => {
            cell.addEventListener('click', function() {
                const row = this.closest('tr');
                const rowIndex = row.getAttribute('data-row-index');
                const scoreValue = parseFloat(this.getAttribute('data-value'));

                // If user clicks the already selected cell, toggle it off
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    delete selectedScores[rowIndex];
                } else {
                    // Clear other selections in the same row
                    row.querySelectorAll('.grade-cell').forEach(c => c.classList.remove('selected'));
                    // Select current cell
                    this.classList.add('selected');
                    selectedScores[rowIndex] = scoreValue;
                }

                calculateTotal();
            });
        });
    }

    // Tally up checked fields
    function calculateTotal() {
        let sum = 0;
        for (const rowIndex in selectedScores) {
            sum += selectedScores[rowIndex];
        }
        // Round safely to fix JS IEEE floating precision glitches
        sum = Math.round(sum * 10) / 10;

        const totalSpan = document.getElementById('running-total');
        if (totalSpan) {
            totalSpan.textContent = sum;
        }
    }

    // 3. Clipboard Logic
    document.getElementById('copy-btn').addEventListener('click', () => {
        const table = tableOutput.querySelector('table');
        if (!table) return;

        let output = "";
        const rows = table.querySelectorAll('tr');
        rows.forEach(row => {
            // Include everything except our custom score counter row in raw clipboard copies
            if (row.classList.contains('total-row')) return;

            const cells = Array.from(row.querySelectorAll('th, td')).map(c => c.innerText.replace(/\n/g, " "));
            output += cells.join('\t') + "\n";
        });

        navigator.clipboard.writeText(output).then(() => {
            const msg = document.getElementById('copy-msg');
            msg.style.opacity = '1';
            setTimeout(() => msg.style.opacity = '0', 2000);
        });
    });

    // Reset current score memory cache cleanly if structural changes occur in input areas
    function clearScoresAndUpdate() {
        selectedScores = {};
        update();
    }

    critInput.addEventListener('input', clearScoresAndUpdate);
    levelInput.addEventListener('input', clearScoresAndUpdate);

    // Initial run
    update();
</script>

</body>
</html>
